<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Manga</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
  <style>
    body{font-family:sans-serif;margin:20px;background:#111;color:#eee}
    input,button,textarea{padding:8px;margin:5px}
    #chapters{ display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:10px; }
    .chapter{border:1px solid #444;padding:10px;background:#222}
    img{max-width:100%;display:block}
  </style>
</head>
<body>

<h1>Subir y leer mangas</h1>

<!-- Auth -->
<div id="auth">
  <input id="email" placeholder="Email" type="email">
  <input id="pass" placeholder="Contraseña" type="password">
  <button onclick="register()">Registrar</button>
  <button onclick="login()">Login</button>
  <button onclick="logout()" id="logout" style="display:none">Salir</button>
  <p id="user"></p>
</div>

<!-- Subir -->
<div id="upload" style="display:none">
  <h2>Subir capítulo</h2>
  <input id="title" placeholder="Título del manga">
  <input id="chapterNum" placeholder="Número capítulo" type="number">
  <input id="files" type="file" multiple accept="image/*">
  <button onclick="uploadChapter()">Subir</button>
</div>

<!-- Lista -->
<h2>Mis mangas</h2>
<div id="chapters"></div>

<!-- Lector + comentarios -->
<div id="reader" style="display:none">
  <button onclick="backToList()">Volver</button>
  <h2 id="readerTitle"></h2>
  <div id="pages"></div>
  
  <h3>Comentarios</h3>
  <textarea id="comment" placeholder="Escribe un comentario..."></textarea>
  <button onclick="addComment()">Enviar</button>
  <div id="comments"></div>
</div>

<script>
// ↓ Pega aquí tu firebaseConfig del console
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROYECTO.firebaseapp.com",
  projectId: "TU_PROYECTO",
  storageBucket: "TU_PROYECTO.appspot.com",
  messagingSenderId: "TU_SENDER_ID",
  appId: "TU_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let currentUser = null;
let currentMangaId = null;

// Auth
auth.onAuthStateChanged(user => {
  currentUser = user;
  document.getElementById("user").textContent = user ? `Hola, ${user.email}` : "";
  document.getElementById("logout").style.display = user ? "inline" : "none";
  document.getElementById("upload").style.display = user ? "block" : "none";
  loadMangas();
});

function register() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;
  auth.createUserWithEmailAndPassword(email, pass).catch(e=>alert(e.message));
}

function login() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;
  auth.signInWithEmailAndPassword(email, pass).catch(e=>alert(e.message));
}

function logout() { auth.signOut(); }

// Subir
async function uploadChapter() {
  if (!currentUser) return alert("Inicia sesión");
  const title = document.getElementById("title").value.trim();
  const chapNum = document.getElementById("chapterNum").value;
  const files = document.getElementById("files").files;

  if (!title || !chapNum || files.length === 0) return alert("Faltan datos");

  const mangaId = title.toLowerCase().replace(/\s+/g,"-") + "-" + currentUser.uid.slice(0,8);
  const chapterId = "cap-" + chapNum.padStart(3,"0");

  const batch = [];
  for (let file of files) {
    const ref = storage.ref(`mangas/\( {mangaId}/ \){chapterId}/${file.name}`);
    await ref.put(file);
    const url = await ref.getDownloadURL();
    batch.push({name: file.name, url});
  }

  await db.collection("mangas").doc(mangaId).set({title, owner: currentUser.uid}, {merge:true});
  await db.collection("mangas").doc(mangaId).collection("chapters").doc(chapterId).set({
    number: Number(chapNum),
    pages: batch,
    uploadedAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  alert("Capítulo subido");
  loadMangas();
}

// Cargar lista
async function loadMangas() {
  const snap = await db.collection("mangas").get();
  let html = "";
  snap.forEach(doc => {
    const d = doc.data();
    html += `<div class="chapter">
      <h3>${d.title}</h3>
      <button onclick="openManga('\( {doc.id}', ' \){d.title}')">Leer</button>
    </div>`;
  });
  document.getElementById("chapters").innerHTML = html || "<p>No hay mangas aún</p>";
}

// Abrir manga
async function openManga(mangaId, title) {
  currentMangaId = mangaId;
  document.getElementById("readerTitle").textContent = title;
  document.getElementById("chapters").style.display = "none";
  document.getElementById("reader").style.display = "block";

  const chapSnap = await db.collection("mangas").doc(mangaId).collection("chapters").orderBy("number").get();
  let pagesHtml = "";
  chapSnap.forEach(doc => {
    const ch = doc.data();
    pagesHtml += `<h4>Capítulo ${ch.number}</h4>`;
    ch.pages.forEach(p => {
      pagesHtml += `<img src="${p.url}" alt="page">`;
    });
  });
  document.getElementById("pages").innerHTML = pagesHtml || "<p>Sin capítulos</p>";

  loadComments();
}

// Comentarios
async function addComment() {
  if (!currentUser || !currentMangaId) return;
  const text = document.getElementById("comment").value.trim();
  if (!text) return;

  await db.collection("mangas").doc(currentMangaId).collection("comments").add({
    text,
    user: currentUser.email,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  document.getElementById("comment").value = "";
  loadComments();
}

async function loadComments() {
  const snap = await db.collection("mangas").doc(currentMangaId).collection("comments").orderBy("createdAt","desc").get();
  let html = "";
  snap.forEach(doc => {
    const c = doc.data();
    html += `<p><b>${c.user}</b>: ${c.text}</p>`;
  });
  document.getElementById("comments").innerHTML = html || "<p>Sin comentarios</p>";
}

function backToList() {
  document.getElementById("reader").style.display = "none";
  document.getElementById("chapters").style.display = "grid";
}
</script>
</body>
</html>
