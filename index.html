<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majunia Zone</title>
    <style>
        /* Estilos rápidos para la vista previa */
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .card {
            background-color: #1a1a1a;
            border: 2px solid #3498db;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .main-logo {
            max-width: 100%;
            height: auto;
            margin-bottom: 20px;
        }
        .status-badge {
            background-color: #2ecc71;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .description {
            color: #ffffff;
            font-size: 1.1rem;
            line-height: 1.4;
            margin-bottom: 20px;
        }
        .divider {
            border: 0;
            border-top: 1px solid #333;
            margin: 20px 0;
        }
        .footer-text {
            color: #888;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="logo.png" alt="Majunia Zone" class="main-logo">

        <div class="status-badge">
            ESTADO: EN CONSTRUCCIÓN
        </div>

        <p class="description">
            Próximamente aquí verás mis proyectos.
        </p>

        <hr class="divider">

        <p class="footer-text">
            Hecho con amor por un artista digital.
        </p>
    </div>

</body>
</html>
