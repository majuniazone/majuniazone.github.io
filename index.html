<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majunia Zone</title>
    <style>
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Arial Black', Gadget, sans-serif;
        }

        /* LOGO CREADO CON CÓDIGO */
        .logo-codificado {
            text-align: center;
            line-height: 0.9;
            margin-bottom: 25px;
            user-select: none;
        }

        .logo-linea {
            display: block;
            font-size: 3rem;
            color: white;
            text-transform: uppercase;
            text-shadow: 
                -3px -3px 0 #ff0000,  
                 3px -3px 0 #ff0000,
                -3px  3px 0 #ff0000,
                 3px  3px 0 #ff0000,
                 5px  5px 0 #000000;
        }

        .card {
            background-color: #111111;
            border: 2px solid #3498db;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            max-width: 400px;
            width: 85%;
            box-shadow: 0 0 30px rgba(52, 152, 219, 0.3);
        }

        .status-badge {
            background-color: #2ecc71;
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 25px;
            display: inline-block;
            font-family: sans-serif;
        }

        .description {
            color: #ffffff;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            font-family: sans-serif;
        }

        .tags {
            color: #f1c40f;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .divider {
            border: 0;
            border-top: 1px solid #222;
            margin: 25px 0;
        }

        .footer {
            color: #666;
            font-size: 0.8rem;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-codificado">
            <span class="logo-linea">MAJUNIA</span>
            <span class="logo-linea">ZONE</span>
        </div>

        <div class="status-badge">SITIO OFICIAL</div>

        <p class="description">
            Bienvenido a mi zona creativa.<br>
            <strong>Próximamente aquí verás mis proyectos.</strong>
        </p>

        <p class="tags">
            MANGA • FANMANGAS • ARTE DIGITAL
        </p>

        <hr class="divider">

        <p class="footer">
            Hecho con amor por Majunia.
        </p>
    </div>

</body>
</html>
