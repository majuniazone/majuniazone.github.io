<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majunia Zone - Fanmangas</title>
    <style>
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
        }
        .card {
            background-color: #111111;
            border: 2px solid #3498db;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.2);
        }
        .main-logo {
            max-width: 100%;
            height: auto;
            margin-bottom: 20px;
        }
        .status-badge {
            background-color: #2ecc71;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: inline-block;
        }
        .description {
            color: #ffffff;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .project-hint {
            color: #f1c40f;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        .footer {
            margin-top: 30px;
            color: #555;
            font-size: 0.75rem;
            border-top: 1px solid #222;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="27926.png" alt="Majunia Zone" class="main-logo">

        <div class="status-badge">SITIO OFICIAL</div>

        <p class="description">
            Bienvenido a mi zona creativa. <br>
            <strong>Próximamente aquí verás mis proyectos.</strong>
        </p>

        <p class="project-hint">
            Manga • Fanmangas • Arte Digital
        </p>

        <div class="footer">
            Espacio protegido para la libre creatividad de Zenqai.
        </div>
    </div>

</body>
</html>
